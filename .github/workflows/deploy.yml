name: NexusOS Deploy

on:
  push:
    branches: [main]
    paths:
      - 'nexusos-v2/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.NEXUSOS_HOST }}
          username: ${{ secrets.NEXUSOS_USER }}
          key: ${{ secrets.NEXUSOS_SSH_KEY }}
          script: |
            cd /root/nexusos-v2
            git pull origin main
            docker build -t nexusos-v6 .
            docker rm -f nexusos-v6 2>/dev/null || true
            docker run -d --name nexusos-v6 -p 8080:8080 -e DATABASE_URL="$DATABASE_URL" -v nexusos-data:/opt/nexusos-data nexusos-v6
