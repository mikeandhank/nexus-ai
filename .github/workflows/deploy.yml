name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.NEXUSOS_HOST }}
          username: ${{ secrets.NEXUSOS_USER }}
          key: ${{ secrets.NEXUSOS_SSH_KEY }}
          script: |
            cd /root/nexusos-v2
            git pull origin main
            docker build -t nexusos-v6 .
            docker rm -f nexusos-v6 || true
            docker run -d --name nexusos-v6 -p 8080:8080 -e DATABASE_URL="$DATABASE_URL" -v nexusos-data:/opt/nexusos-data nexusos-v6
