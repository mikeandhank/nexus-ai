name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H $SERVER_HOST >> ~/.ssh/known_hosts
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}

      - name: Test SSH
        run: |
          ssh -v -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "echo SSH works!"

      - name: Deploy
        run: |
          curl -L -o /tmp/nexusos.zip https://github.com/mikeandhank/nexus-ai/archive/refs/heads/main.zip
          unzip -o /tmp/nexusos.zip -d /tmp/
          
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            cd /root
            rm -rf nexusos-v2 || true
            cp -r /tmp/nexus-ai-main nexusos-v2
            cd nexusos-v2/nexusos-v2
            docker build -t nexusos-v6 .
            docker rm -f nexusos-v6 || true
            docker run -d --name nexusos-v6 -p 8080:8080 -e DATABASE_URL="$DATABASE_URL" -v nexusos-data:/opt/nexusos-data nexusos-v6
          EOF
