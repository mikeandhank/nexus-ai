name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4
        with:
          repository: mikeandhank/nexus-ai
          path: nexusos
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Debug secrets
        run: |
          echo "SSH_KEY set: ${{ secrets.SSH_PRIVATE_KEY != '' }}"
          echo "SERVER_HOST set: ${{ secrets.SERVER_HOST != '' }}"
          echo "SERVER_USER set: ${{ secrets.SERVER_USER != '' }}"
          
      - name: Fail if secrets missing
        run: |
          if [ -z "$SSH_KEY" ] || [ -z "$SERVER_HOST" ] || [ -z "$SERVER_USER" ]; then
            echo "ERROR: Missing required secrets"
            echo "SSH_KEY: $SSH_KEY"
            echo "SERVER_HOST: $SERVER_HOST"  
            echo "SERVER_USER: $SERVER_USER"
            exit 1
          fi
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H $SERVER_HOST >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          
      - name: Test SSH
        run: ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST "echo SSH works" || exit 1
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          
      - name: Deploy
        run: |
          # Get current version number or start at 34
          CURRENT_V=$(ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST "docker images --format '{{.Tag}}' | grep -E '^v[0-9]+$' | sed 's/v//' | sort -n | tail -1" 2>/dev/null || echo "33")
          NEXT_V=$((CURRENT_V + 1))
          echo "Deploying version v$NEXT_V"
          
          ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST "
            cd /root/nexus-ai && git pull origin main || git clone https://github.com/mikeandhank/nexus-ai.git .
            cd nexusos-v2
            
            # Build new version
            docker build -t nexusos-v\$NEXT_V .
            docker tag nexusos-v\$NEXT_V nexusos-latest
            
            # Stop old container
            docker rm -f nexusos-api 2>/dev/null || true
            
            # Run new container with correct network and container names (not IPs)
            docker rm -f nexusos-api 2>/dev/null || true
            docker run -d --name nexusos-api --network nexusos-v2_nexusos-network \
              -e DATABASE_URL='postgresql://nexusos:nexusos@nexusos-postgres:5432/nexusos' \
              -e REDIS_URL='redis://nexusos-redis:6379/0' \
              -e USE_PG=1 \
              -e NEXUSOS_SECRET=nexusos-v5-enterprise \
              -e OLLAMA_BASE_URL='http://nexusos-ollama:11434' \
              -p 8080:8080 \
              nexusos-v\$NEXT_V
              
            sleep 3
            
            # Verify it's running
            docker logs nexusos-api --tail 5
            docker ps | grep nexusos-api
            
            # Keep only last 2 versions, delete rest
            echo 'Cleaning up old images...'
            docker images | grep 'nexusos-v' | awk '{print \$1\":\"\$2}' | grep -v 'v\$NEXT_V\|v\$CURRENT_V' | xargs -r docker rmi 2>/dev/null || true
            
            echo 'Remaining images:'
            docker images | grep nexusos
          "
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
