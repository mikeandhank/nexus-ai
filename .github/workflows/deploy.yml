name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: mikeandhank/nexus-ai
      - uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p /root/nexusos-v2
            cd /root/nexusos-v2
            if [ ! -d .git ]; then
              git init
              git remote add origin https://github.com/mikeandhank/nexus-ai.git
            fi
            git fetch origin
            git checkout main
            docker build -t nexusos-v6 .
            docker rm -f nexusos-v6 || true
            docker run -d --name nexusos-v6 -p 8080:8080 -e DATABASE_URL="$DATABASE_URL" -v nexusos-data:/opt/nexusos-data nexusos-v6
