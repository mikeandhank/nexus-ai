name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4
        with:
          repository: mikeandhank/nexus-ai
          path: nexusos
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Debug secrets
        run: |
          echo "SSH_KEY set: ${{ secrets.SSH_PRIVATE_KEY != '' }}"
          echo "SERVER_HOST set: ${{ secrets.SERVER_HOST != '' }}"
          echo "SERVER_USER set: ${{ secrets.SERVER_USER != '' }}"
          
      - name: Fail if secrets missing
        run: |
          if [ -z "$SSH_KEY" ] || [ -z "$SERVER_HOST" ] || [ -z "$SERVER_USER" ]; then
            echo "ERROR: Missing required secrets"
            echo "SSH_KEY: $SSH_KEY"
            echo "SERVER_HOST: $SERVER_HOST"  
            echo "SERVER_USER: $SERVER_USER"
            exit 1
          fi
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H $SERVER_HOST >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          
      - name: Test SSH
        run: ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST "echo SSH works" || exit 1
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          
      - name: Deploy
        run: |
          ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST "
            cd /root/nexus-ai && git pull origin main || git clone https://github.com/mikeandhank/nexus-ai.git .
            cd nexusos-v2
            docker build -t nexusos-latest .
            docker rm -f nexusos-api 2>/dev/null || true
            docker run -d --name nexusos-api --network host \
              -e DATABASE_URL='postgresql://nexusos:nexusos@172.19.0.4:5432/nexusos' \
              -e REDIS_URL='redis://172.19.0.2:6379/0' \
              -e USE_PG=1 \
              -e NEXUSOS_SECRET=nexusos-v5-enterprise \
              -e OLLAMA_URL=http://172.19.0.5:11434 \
              nexusos-latest
            sleep 3
            docker logs nexusos-api --tail 5
            docker ps | grep nexusos-api
          "
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
