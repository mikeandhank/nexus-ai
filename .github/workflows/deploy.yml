name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: mikeandhank/nexus-ai
          path: nexusos
      
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H $SERVER_HOST >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          
      - name: Test SSH
        run: |
          ssh -v -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST "echo SSH works"
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          
      - name: Deploy
        run: |
          ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST "cd /root/nexus-ai && git pull origin main && cd nexusos-v2 && docker build -t nexusos-v6 . && docker rm -f nexusos-v6 || true && docker run -d --name nexusos-v6 --network nexusos-network -p 8080:8080 -e DATABASE_URL='postgresql://nexusos:nexusos@nexusos-postgres:5432/nexusos' -e REDIS_URL='redis://nexusos-redis:6379' -v nexusos-data:/opt/nexusos-data nexusos-v6"
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
