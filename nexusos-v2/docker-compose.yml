version: '3.8'

services:
  # Redis for async tasks and caching
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - nexusos-network
    restart: unless-stopped
    volumes:
      - redis-data:/data

  # NexusOS API
  nexusos-api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - NEXUSOS_DB=/opt/nexusos-data/nexusos.db
      - NEXUSOS_SECRET=${NEXUSOS_SECRET:-nexusos-v5-enterprise}
      - OLLAMA_URL=http://nexusos-ollama:11434
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
      - nexusos-ollama
    networks:
      - nexusos-network
    restart: unless-stopped
    volumes:
      - nexusos-data:/opt/nexusos-data

  # Ollama for local LLM
  nexusos-ollama:
    image: ollama/ollama
    ports:
      - "11435:11434"
    networks:
      - nexusos-network
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama

networks:
  nexusos-network:
    driver: bridge

volumes:
  nexusos-data:
  ollama-data:
  redis-data:
