version: '3.8'

services:
  # Nginx reverse proxy with TLS
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - nexusos-v2-flask
    networks:
      - nexusos-network
    restart: unless-stopped

  # NexusOS API (Flask)
  nexusos-v2-flask:
    build: .
    environment:
      - NEXUSOS_DB=/opt/nexusos-data/nexusos.db
      - NEXUSOS_SECRET=${NEXUSOS_SECRET:-nexusos-v5-enterprise}
      - OLLAMA_URL=http://nexusos-ollama:11434
    volumes:
      - nexusos-data:/opt/nexusos-data
    networks:
      - nexusos-network
    restart: unless-stopped
    depends_on:
      - nexusos-ollama

  # Ollama (local LLM)
  nexusos-ollama:
    image: ollama/ollama
    ports:
      - "11435:11434"
    networks:
      - nexusos-network
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama

networks:
  nexusos-network:
    driver: bridge

volumes:
  nexusos-data:
  ollama-data:
