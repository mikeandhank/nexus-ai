version: '3.8'

services:
  # PostgreSQL for concurrent enterprise workloads
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: nexusos
      POSTGRES_PASSWORD: nexusos
      POSTGRES_DB: nexusos
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - nexusos-network
    restart: unless-stopped

  # Redis for shared state
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - nexusos-network
    restart: unless-stopped
    volumes:
      - redis-data:/data

  # NexusOS API
  nexusos-api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://nexusos:nexusos@postgres:5432/nexusos
      - REDIS_URL=redis://redis:6379/0
      - NEXUSOS_SECRET=${NEXUSOS_SECRET:-nexusos-v5-enterprise}
      - OLLAMA_URL=http://nexusos-ollama:11434
    depends_on:
      - postgres
      - redis
      - nexusos-ollama
    networks:
      - nexusos-network
    restart: unless-stopped
    volumes:
      - nexusos-data:/opt/nexusos-data

  # Ollama for local LLM
  nexusos-ollama:
    image: ollama/ollama
    ports:
      - "11435:11434"
    networks:
      - nexusos-network
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama

networks:
  nexusos-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  nexusos-data:
  ollama-data:
