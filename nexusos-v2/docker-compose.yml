version: '3.8'

services:
  # PostgreSQL for concurrent enterprise workloads
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: nexusos
      POSTGRES_PASSWORD: nexusos
      POSTGRES_DB: nexusos
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - nexusos-network
    restart: unless-stopped
    labels:
      - "traefik.enable=true"

  # Redis for shared state and Celery broker
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - nexusos-network
    restart: unless-stopped
    volumes:
      - redis-data:/data
    labels:
      - "traefik.enable=true"

  # NexusOS API behind Traefik
  nexusos-api:
    build: .
    environment:
      - DATABASE_URL=postgresql://nexusos:nexusos@postgres:5432/nexusos
      - REDIS_URL=redis://redis:6379/0
      - NEXUSOS_SECRET=${NEXUSOS_SECRET:-nexusos-v5-enterprise}
      - OLLAMA_URL=http://nexusos-ollama:11434
    networks:
      - nexusos-network
    restart: unless-stopped
    volumes:
      - nexusos-data:/opt/nexusos-data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nexusos.rule=Host(nexusos.cloud)"
      - "traefik.http.routers.nexusos.tls=true"
      - "traefik.http.routers.nexusos.entrypoints=https"
      - "traefik.http.services.nexusos.loadbalancer.server.port=8080"
      - "traefik.http.middlewares.nexusos-https.redirectscheme.scheme=https"
      - "traefik.http.routers.nexusos-http.rule=Host(nexusos.cloud)"
      - "traefik.http.routers.nexusos-http.entrypoints=http"
      - "traefik.http.routers.nexusos-http.middlewares.nexusos-https.redirectscheme"

  # Celery Worker for async tasks
  celery-worker:
    build: .
    command: celery -A tasks.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://nexusos:nexusos@postgres:5432/nexusos
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    networks:
      - nexusos-network
    restart: unless-stopped

  # Ollama for local LLM
  nexusos-ollama:
    image: ollama/ollama
    ports:
      - "11435:11434"
    networks:
      - nexusos-network
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    labels:
      - "traefik.enable=false"

  # Traefik for TLS/HTTPS (Let's Encrypt)
  traefik:
    image: traefik:v3.0
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-acme:/acme
    environment:
      - TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_EMAIL=admin@nexusos.cloud
      - TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_STORAGE=/acme/acme.json
      - TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_HTTPCHALLENGE=true
      - TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_HTTPCHALLENGE_ENTRYPOINT=http
    networks:
      - nexusos-network
    restart: unless-stopped
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedByDefault=false"
      - "--entrypoints.http=true"
      - "--entrypoints.http.address=80"
      - "--entrypoints.https=true"
      - "--entrypoints.https.address=443"
      - "--certificatesResolvers.letsencrypt.acme.email=admin@nexusos.cloud"
      - "--certificatesResolvers.letsencrypt.acme.storage=/acme/acme.json"
      - "--certificatesResolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesResolvers.letsencrypt.acme.httpchallenge.entrypoint=http"

networks:
  nexusos-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  nexusos-data:
  ollama-data:
  traefik-acme:
