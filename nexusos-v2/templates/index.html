<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusOS - AI Agent Platform</title>
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --bg-card: #12121a;
            --bg-input: #1a1a24;
            --accent: #00ff88;
            --accent-dim: #00cc6a;
            --text: #e0e0e0;
            --text-dim: #888;
            --border: #2a2a3a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-dark); color: var(--text); height: 100vh; display: flex; overflow: hidden; }
        .sidebar { width: 260px; background: var(--bg-card); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; }
        .logo { font-size: 24px; font-weight: bold; color: var(--accent); margin-bottom: 30px; }
        .nav-item { padding: 12px 16px; border-radius: 8px; cursor: pointer; margin-bottom: 8px; transition: background 0.2s; }
        .nav-item:hover { background: var(--bg-input); }
        .nav-item.active { background: var(--accent); color: var(--bg-dark); }
        .main { flex: 1; display: flex; flex-direction: column; }
        .header { padding: 20px 30px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .chat-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .messages { flex: 1; overflow-y: auto; padding: 20px 30px; }
        .message { max-width: 70%; margin-bottom: 20px; padding: 16px 20px; border-radius: 12px; line-height: 1.5; }
        .message.user { background: #0044aa; margin-left: auto; border-bottom-right-radius: 4px; }
        .message.assistant { background: var(--bg-card); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
        .input-area { padding: 20px 30px; border-top: 1px solid var(--border); display: flex; gap: 12px; }
        .input-area input { flex: 1; padding: 16px 20px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-size: 16px; outline: none; }
        .input-area input:focus { border-color: var(--accent); }
        .input-area button { padding: 16px 32px; background: var(--accent); border: none; border-radius: 12px; color: var(--bg-dark); font-weight: bold; cursor: pointer; }
        .input-area button:hover { background: var(--accent-dim); }
        .auth-screen { flex: 1; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--bg-card); padding: 40px; border-radius: 16px; width: 400px; border: 1px solid var(--border); }
        .auth-card h2 { margin-bottom: 30px; text-align: center; }
        .auth-card input { width: 100%; padding: 14px 16px; margin-bottom: 16px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; }
        .auth-card button { width: 100%; padding: 14px; background: var(--accent); border: none; border-radius: 8px; color: var(--bg-dark); font-weight: bold; cursor: pointer; }
        .auth-card .switch { text-align: center; margin-top: 20px; color: var(--text-dim); font-size: 14px; cursor: pointer; }
        .hidden { display: none !important; }
        .tier-badge { margin-top: auto; padding: 12px; background: var(--bg-input); border-radius: 8px; font-size: 12px; }
    </style>
</head>
<body>
    <div id="auth-screen" class="auth-screen">
        <div class="auth-card">
            <h2>NexusOS</h2>
            <form id="auth-form">
                <input type="email" id="auth-email" placeholder="Email" required>
                <input type="password" id="auth-password" placeholder="Password" required>
                <input type="text" id="auth-name" placeholder="Name (register)" style="display:none">
                <button type="submit" id="auth-btn">Login</button>
            </form>
            <div class="switch" id="auth-switch">Register account</div>
        </div>
    </div>
    <div id="app" class="hidden" style="display:flex;flex:1">
        <div class="sidebar">
            <div class="logo">NexusOS</div>
            <div class="nav-item active" data-view="chat">Chat</div>
            <div class="nav-item" data-view="conversations">Conversations</div>
            <div class="nav-item" data-view="agents">Agents</div>
            <div class="nav-item" data-view="settings">Settings</div>
            <div class="tier-badge" id="tier-badge">FREE TIER</div>
        </div>
        <div class="main">
            <div class="header"><h1 id="view-title">Chat</h1><span id="user-name"></span></div>
            <div id="chat-view" class="chat-container">
                <div class="messages" id="messages"></div>
                <div class="input-area">
                    <input type="text" id="message-input" placeholder="Type message..." onkeypress="if(event.key==='Enter')sendMessage()">
                    <button onclick="sendMessage()">Send</button>
                </div>
            </div>
            <div id="settings-view" class="chat-container hidden">
                <div class="messages">
                    <h3>API Keys (BYOK)</h3>
                    <input type="text" id="api-provider" placeholder="Provider (openrouter/anthropic)" style="width:100%;padding:10px;margin:10px 0;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;color:var(--text)">
                    <input type="password" id="api-key" placeholder="API Key" style="width:100%;padding:10px;margin:10px 0;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;color:var(--text)">
                    <button onclick="addApiKey()" style="padding:10px 20px;background:var(--accent);border:none;border-radius:8px;cursor:pointer">Add Key</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        const API = 'http://' + window.location.hostname + ':8080/api';
        let userId = null, isRegister = false;
        document.getElementById('auth-switch').onclick = () => { isRegister = !isRegister; document.getElementById('auth-btn').textContent = isRegister?'Register':'Login'; document.getElementById('auth-name').style.display = isRegister?'block':'none'; };
        document.getElementById('auth-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const name = document.getElementById('auth-name').value;
            try {
                const res = await fetch(API + '/auth/' + (isRegister?'register':'login'), { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({email, password, name}) });
                const data = await res.json();
                if (data.error) { alert(data.error); return; }
                userId = data.user_id;
                document.getElementById('auth-screen').class}
