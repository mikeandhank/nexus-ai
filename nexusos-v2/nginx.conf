# NexusOS Nginx Reverse Proxy with TLS

upstream nexusos_backend {
    server nexusos-v2-flask:8080;
}

# HTTP server (redirects to HTTPS)
server {
    listen 80;
    server_name _;
    
    location / {
        # For development, just proxy HTTP directly
        # In production, uncomment the redirect below
        # return 301 https://$host$request_uri;
        
        proxy_pass http://nexusos_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTPS server (optional - for production)
server {
    listen 443 ssl http2;
    server_name _;
    
    # For testing, use self-signed certs
    # In production, use Let's Encrypt or bought certs
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    
    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000" always;
    
    location / {
        proxy_pass http://nexusos_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
